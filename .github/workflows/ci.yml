name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List docs
        run: |
          test -f docs/noticer-plan.md
          test -f docs/rob-todos.md
          test -f docs/audit-findings.md
          test -f docs/architecture.md
